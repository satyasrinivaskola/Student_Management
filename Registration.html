<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="Registration.css">
</head>
<body>

<div class="container">

<h2>SkillHub Student Registration</h2>

<form >

<input type="text" id="firstname" placeholder="First Name" >

<input type="text" id="lastname" placeholder="Last Name" >

<input type="email" id="email" placeholder="Email" >

<input type="tel" id="contact" placeholder="Contact Number" >

<input type="text" id="aadhaar" placeholder="Aadhaar Number" maxlength="12" >

<textarea id="address" placeholder="Address" ></textarea>

<select id="gender" >
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
</select>

<input type="date" id="dob" >

<input type="text" id="qualification" placeholder="Highest Qualification" >

<input type="text" id="college" placeholder="College Name">

<input type="text" id="course" placeholder="Course Interested" >

<input type="password" id="password" placeholder="Password" >

<input type="password" id="confirmpassword" placeholder="Confirm Password" >

<button type="button" onclick="Registration()" >Register</button>

</form>
<button onclick="back()">Back</button>
</div>
<script src="Registration.js"></script>
</body>
</html>
