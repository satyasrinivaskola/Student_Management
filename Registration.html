<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link rel="stylesheet" href="Registration.css">
</head>
<body>

<div class="container">

<h2>SkillHub Student Registration</h2>

<form action="/register" method="POST" onSubmit="Registered()">

<input type="text" name="firstname" placeholder="First Name" required>

<input type="text" name="lastname" placeholder="Last Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="tel" name="contact" placeholder="Contact Number" required>

<input type="text" name="aadhaar" placeholder="Aadhaar Number" maxlength="12" required>

<textarea name="address" placeholder="Address" required></textarea>

<select name="gender" required>
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
</select>

<input type="date" name="dob" required>

<input type="text" name="qualification" placeholder="Highest Qualification" required>

<input type="text" name="college" placeholder="College Name">

<input type="text" name="course" placeholder="Course Interested" required>

<input type="password" name="password" placeholder="Password" required>

<input type="password" name="confirmpassword" placeholder="Confirm Password" required>

<button type="submit" >Register</button>

</form>

</div>
<script src="data_insert.js"></script>
</body>
</html>
